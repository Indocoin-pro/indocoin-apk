name: Build INDOCOIN APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/INDOCOIN.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: INDOCOIN
          path: app/build/outputs/apk/release/INDOCOIN.apk
